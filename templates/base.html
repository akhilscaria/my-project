{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}My App{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

<nav class="navbar">
    <h3><a href="/home/">My App</a></h3>

    <div>
        {% if request.session.is_authenticated %}
            <span>Hi, 
                <a href="/customers/details/{{ request.session.userid }}/">{{ request.session.username }}</a>
            </span>
            <a href="/logout/">Logout</a>
        {% else %}
            <a href="/">Login</a>
        {% endif %}
    </div>
</nav>

<div class="container">

    {% if messages %}
        {% for message in messages %}
            <div style="padding:10px; margin:10px; border:1px solid;">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    {% block content %}
    {% endblock %}

</div>

</body>
</html>
