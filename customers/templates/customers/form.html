{% extends 'base.html' %}

{% block content %}
<h2>Customer Form</h2>

<form method="POST">
    {% csrf_token %}

    <input type="text" name="name" value="{{ customer.name|default:'' }}" placeholder="Name"><br><br>

    <input type="email" name="email" value="{{ customer.email|default:'' }}" placeholder="Email"><br><br>

    <input type="text" name="phone" value="{{ customer.phone|default:'' }}" placeholder="Phone"><br><br>

    <button type="submit">Save</button>
</form>

{% endblock %}
